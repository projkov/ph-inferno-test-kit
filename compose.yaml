services:
  ig-downloader:
    image: curlimages/curl:latest
    volumes:
      - ./resources/ig:/output/ig
      - ./lib/ph_core_test_kit/igs:/output/igs
    entrypoint: >
      sh -c "
        curl -fsSL -o /tmp/package.tgz https://build.fhir.org/ig/UP-Manila-SILab/ph-core/package.tgz &&
        cp /tmp/package.tgz /output/ig/0.2.0-ci-build.tgz &&
        cp /tmp/package.tgz /output/igs/0.2.0-ci-build.tgz
      "

  inferno:
    build:
      context: ./
    volumes:
      - ./data:/opt/inferno/data
      - ./lib/:/opt/inferno/lib
      - ./:/opt/inferno/
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inferno
      POSTGRES_USER: postgres
      TX_SERVER_URL: https://tx.dev.hl7.org.au/fhir
      REDIS_URL: redis://redis:6379
      FHIR_RESOURCE_VALIDATOR_URL: http://nginx/hl7validatorapi
  inferno-worker:
    build:
      context: ./
    volumes:
      - ./data:/opt/inferno/data
    command: bundle exec sidekiq -r ./worker.rb
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      validator-api:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inferno
      POSTGRES_USER: postgres
      REDIS_URL: redis://redis:6379
      FHIR_RESOURCE_VALIDATOR_URL: http://nginx/hl7validatorapi
  fhirpath:
    image: infernocommunity/fhirpath-service
    ports:
      - "6789:6789"
  validator-api:
    image: markiantorno/validator-wrapper:1.0.70
    depends_on:
      ig-downloader:
        condition: service_completed_successfully
    environment:
      SESSION_CACHE_DURATION: -1
    volumes:
      - ./lib/ph_core_test_kit/igs:/home/igs
  nginx:
    image: nginx
    ports:
      - "80:80"
    command: [nginx, '-g', 'daemon off;']
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      validator-api:
        condition: service_started
      inferno:
        condition: service_started
  redis:
    image: redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
  postgres:
    image: postgres:16.2-alpine3.19
    restart: always
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inferno
volumes:
  redis-data:
