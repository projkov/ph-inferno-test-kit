      text:
        status: generated
        div: <div xmlns="http://www.w3.org/1999/xhtml"><p>Patient Juan Dela Cruz,
          45M, Filipino, presented to PGH ED at 08:30 with acute chest pain. Pain
          described as crushing, 8/10 severity, substernal with radiation to left
          arm. Associated with shortness of breath and sweating. No relief with rest.
          Known T2DM since 2020. Current smoker (1 pack/day x 20 years).</p></div>
    - title: Vital Signs
      code:
        coding:
        - system: http://loinc.org
          code: 8716-3
          display: Vital signs note
      text:
        status: generated
        div: '<div xmlns="http://www.w3.org/1999/xhtml"><ul><li>BP: 160/95 mmHg (elevated)</li><li>HR:
          110 bpm (tachycardic)</li><li>RR: 24/min (tachypneic)</li><li>SpO2: 92%
          RA (hypoxemic)</li><li>Temp: 37.2°C</li><li>Pain: 8/10</li></ul></div>'
