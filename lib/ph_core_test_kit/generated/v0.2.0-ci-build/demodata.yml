        coding:
        - system: http://loinc.org
          code: 18776-5
          display: Plan of care note
      text:
        status: generated
        div: <div xmlns="http://www.w3.org/1999/xhtml"><p><strong>Assessment:</strong>
          Acute Coronary Syndrome — Anterior STEMI (ST-elevation V1-V4 on ECG, elevated
          troponin 2.5 ng/mL).</p><p><strong>Plan:</strong> 1) Aspirin 325mg chewed,
          Clopidogrel 600mg loading, Metoprolol 25mg PO. 2) Cardiology consult for
          emergent PCI. 3) Admit to CCU post-PCI.</p></div>
